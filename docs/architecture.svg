<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 600" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 z" fill="#5c6660"/>
    </marker>
    <marker id="arrow-green" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 z" fill="#1d5c45"/>
    </marker>
  </defs>

  <rect width="1040" height="600" fill="#f7f6f2"/>
  <text x="32" y="44" font-size="22" font-weight="700" fill="#21272a">FlowGate — Architecture</text>
  <text x="32" y="68" font-size="13" fill="#5c6660">Angular SPA · nginx · NestJS (DDD bounded contexts) · PostgreSQL · WebSocket realtime</text>

  <!-- Browser -->
  <rect x="32" y="110" width="220" height="190" rx="10" fill="#fffefb" stroke="#c9c5b8" stroke-width="1.5"/>
  <text x="48" y="138" font-size="14" font-weight="700" fill="#21272a">Browser — Angular SPA</text>
  <text x="48" y="162" font-size="12" fill="#5c6660">Standalone Components</text>
  <text x="48" y="180" font-size="12" fill="#5c6660">Signals + computed()</text>
  <text x="48" y="198" font-size="12" fill="#5c6660">Reactive Forms (Wizard)</text>
  <text x="48" y="216" font-size="12" fill="#5c6660">Route Guards + Interceptor</text>
  <text x="48" y="234" font-size="12" fill="#5c6660">socket.io-client</text>
  <rect x="48" y="250" width="186" height="30" rx="4" fill="#e4ede7"/>
  <text x="58" y="270" font-size="12" fill="#1d5c45" font-weight="600">Live-Board · Toasts (kein Reload)</text>

  <!-- nginx -->
  <rect x="320" y="140" width="150" height="130" rx="10" fill="#fffefb" stroke="#c9c5b8" stroke-width="1.5"/>
  <text x="336" y="168" font-size="14" font-weight="700" fill="#21272a">nginx</text>
  <text x="336" y="192" font-size="12" fill="#5c6660">TLS (Let's Encrypt,</text>
  <text x="336" y="208" font-size="12" fill="#5c6660">DNS-01 wildcard)</text>
  <text x="336" y="226" font-size="12" fill="#5c6660">SPA + /api-Proxy</text>
  <text x="336" y="244" font-size="12" fill="#5c6660">WS-Upgrade</text>

  <!-- NestJS -->
  <rect x="540" y="100" width="330" height="360" rx="10" fill="#fffefb" stroke="#1d5c45" stroke-width="2"/>
  <text x="556" y="130" font-size="14" font-weight="700" fill="#21272a">NestJS Backend — Bounded Contexts</text>

  <rect x="556" y="148" width="142" height="64" rx="6" fill="#f7f6f2" stroke="#c9c5b8"/>
  <text x="568" y="170" font-size="12" font-weight="700" fill="#21272a">auth</text>
  <text x="568" y="188" font-size="11" fill="#5c6660">JWT · Login-UseCase</text>
  <text x="568" y="203" font-size="11" fill="#5c6660">Guards (401/403)</text>

  <rect x="712" y="148" width="142" height="64" rx="6" fill="#f7f6f2" stroke="#c9c5b8"/>
  <text x="724" y="170" font-size="12" font-weight="700" fill="#21272a">users</text>
  <text x="724" y="188" font-size="11" fill="#5c6660">domain / application /</text>
  <text x="724" y="203" font-size="11" fill="#5c6660">infrastructure</text>

  <rect x="556" y="228" width="298" height="118" rx="6" fill="#f7f6f2" stroke="#c9c5b8"/>
  <text x="568" y="250" font-size="12" font-weight="700" fill="#21272a">requests</text>
  <text x="568" y="268" font-size="11" fill="#5c6660">domain: Entity + State-Machine (TRANSITIONS),</text>
  <text x="568" y="283" font-size="11" fill="#5c6660">Repository-Interfaces — framework-frei</text>
  <text x="568" y="301" font-size="11" fill="#5c6660">application: Use-Cases (TDD), DTOs, Controller</text>
  <text x="568" y="316" font-size="11" fill="#5c6660">infrastructure: TypeORM-Repos, Migrations</text>
  <rect x="568" y="324" width="190" height="16" rx="3" fill="#e4ede7"/>
  <text x="574" y="336" font-size="10" fill="#1d5c45" font-weight="600">append-only Audit-Trail (request_events)</text>

  <rect x="556" y="362" width="298" height="78" rx="6" fill="#e3eef1" stroke="#0e5a6d"/>
  <text x="568" y="384" font-size="12" font-weight="700" fill="#0e5a6d">events — WebSocket-Gateway</text>
  <text x="568" y="402" font-size="11" fill="#5c6660">@OnEvent('request.status-changed')</text>
  <text x="568" y="417" font-size="11" fill="#5c6660">JWT-Handshake · Räume: user:&lt;id&gt; / reviewers</text>
  <text x="568" y="432" font-size="11" fill="#5c6660">Sichtbarkeitsregeln wie REST</text>

  <!-- Domain event arrow inside backend -->
  <path d="M 705 346 L 705 362" stroke="#1d5c45" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="713" y="358" font-size="10" fill="#1d5c45">Domain-Event (EventEmitter2)</text>

  <!-- PostgreSQL -->
  <rect x="540" y="498" width="330" height="70" rx="10" fill="#fffefb" stroke="#c9c5b8" stroke-width="1.5"/>
  <text x="556" y="526" font-size="14" font-weight="700" fill="#21272a">PostgreSQL 18</text>
  <text x="556" y="546" font-size="12" fill="#5c6660">users · requests (payload jsonb) · request_events — via Migrations</text>

  <!-- Arrows -->
  <path d="M 252 205 L 320 205" stroke="#5c6660" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="258" y="196" font-size="11" fill="#5c6660">HTTPS</text>
  <path d="M 470 205 L 540 205" stroke="#5c6660" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="480" y="196" font-size="11" fill="#5c6660">REST /api/v1</text>
  <path d="M 700 460 L 700 498" stroke="#5c6660" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="710" y="484" font-size="11" fill="#5c6660">TypeORM</text>

  <!-- WebSocket back path -->
  <path d="M 556 430 C 380 430 300 330 252 286" stroke="#0e5a6d" stroke-width="2" fill="none" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
  <text x="300" y="372" font-size="11" fill="#0e5a6d">WebSocket-Push (live)</text>

  <!-- Docker note -->
  <rect x="32" y="498" width="438" height="70" rx="10" fill="#fffefb" stroke="#c9c5b8" stroke-width="1.5"/>
  <text x="48" y="526" font-size="14" font-weight="700" fill="#21272a">Deployment</text>
  <text x="48" y="546" font-size="12" fill="#5c6660">Docker multi-stage · compose · Migrations beim Start · Secrets via .env</text>
</svg>
